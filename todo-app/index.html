<html lang="cz">
<head>
    <meta charset="UTF-8">
    
    <title>Todo list</title>
    <link rel="stylesheet" href="todo-list.css">
</head>
<body>
    <div class="container">
        <h2>To Do List</h2>
       
<input placeholder="Zadej úkol" type="text" id="todoInput"> <select id="category"> 
    <option value="" selected>Vybrat kategorii</option>
  <option value="work">Work</option>
  <option value="home">Home</option>
  <option value="other">Other</option>
</select>  

<select id="priority">
    <option value="" selected>Vybrat Prioritu</option>
    <option value="low">Nízká</option>
    <option value="medium">Střední</option>
    <option value="hight">Vysoká</option>
</select>

<input type="date" id="date" >



<button id="addBtn" class="add-btn">Přidat</button>
<p id="duplicateMessage" class="duplicateMessage">Úkol vytvořen</p>
<input placeholder="Vyhledej úkol" type="text" id="search"> 
<button id="clearsearch" class="clearsearch">Smazat search</button>
<button id="clearBtn" class="clearBtn">Smazat completed</button> 


<div class="filters">
  <button class="filter-btn" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="completed">Completed</button>
</div> <p id="emptyMessage">Žádné úkoly nenalezeny</p> 


<ul id="todoList"></ul>
<p id="counter" class="counter"></p>
    </div>

<script src="TODO-APP2.js"></script>

</body>
</html>
